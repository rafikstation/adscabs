<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AdsCabs — Admin Login</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --yellow: #EB5E28;
    --black: #0c0c0c;
    --panel: #161616;
    --border: rgba(255,255,255,.10);
    --input-bg: #1e1e1e;
    --txt: #e2e2e2;
    --txt-muted: #888;
    --error: #ff5252;
  }
  body {
    font-family: "Helvetica Neue", Helvetica, Arial, sans-serif;
    background: var(--black);
    color: var(--txt);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    -webkit-font-smoothing: antialiased;
  }
  .card {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 48px 44px;
    width: 100%;
    max-width: 420px;
  }
  .logo {
    display: inline-flex;
    align-items: stretch;
    font-weight: 900;
    border: 2px solid var(--yellow);
    margin-bottom: 6px;
    line-height: 1;
  }
  .logo .t { background: var(--yellow); color: #fff; padding: 5px 8px; font-size: 18px; }
  .logo .m { color: #fff; padding: 5px 9px; font-size: 18px; }
  .logo-wrap { margin-bottom: 32px; }
  .logo-tag { color: var(--yellow); font-size: 12px; font-weight: 700; letter-spacing: 1.5px; text-transform: uppercase; display: block; margin-top: 6px; }
  h1 { font-size: 22px; font-weight: 800; color: #fff; margin-bottom: 6px; }
  .subtitle { color: var(--txt-muted); font-size: 13.5px; margin-bottom: 32px; }
  .field { margin-bottom: 18px; }
  label { display: block; font-size: 12px; font-weight: 700; color: var(--txt-muted); letter-spacing: .5px; text-transform: uppercase; margin-bottom: 7px; }
  input {
    display: block; width: 100%;
    background: var(--input-bg); border: 1px solid var(--border);
    border-radius: 6px; color: var(--txt);
    font-family: inherit; font-size: 14.5px;
    padding: 12px 14px;
    outline: none;
    transition: border-color .15s;
  }
  input:focus { border-color: var(--yellow); }
  .error-msg { color: var(--error); font-size: 13px; margin-bottom: 16px; display: none; }
  .error-msg.show { display: block; }
  .btn {
    display: flex; align-items: center; justify-content: center; gap: 8px;
    width: 100%; padding: 14px 20px;
    background: var(--yellow); color: #0c0c0c;
    font-family: inherit; font-size: 14px; font-weight: 800;
    border: none; border-radius: 6px; cursor: pointer;
    transition: background .15s, transform .1s;
    margin-top: 8px;
  }
  .btn:hover { background: #f06a30; transform: translateY(-1px); }
  .btn:active { transform: translateY(0); }
  .btn:disabled { opacity: .6; cursor: default; transform: none; }
  .footer-note { text-align: center; margin-top: 24px; color: var(--txt-muted); font-size: 12px; }
  .footer-note a { color: var(--yellow); text-decoration: none; }
</style>
</head>
<body>
<div class="card">
  <div class="logo-wrap">
    <span class="logo"><span class="t">ADS</span><span class="m">CABS</span></span>
    <span class="logo-tag">Admin CMS</span>
  </div>
  <h1>Welcome back</h1>
  <p class="subtitle">Sign in to manage website content.</p>
  <form id="loginForm">
    <div class="field">
      <label for="username">Username</label>
      <input id="username" type="text" autocomplete="username" placeholder="admin" required>
    </div>
    <div class="field">
      <label for="password">Password</label>
      <input id="password" type="password" autocomplete="current-password" placeholder="••••••••" required>
    </div>
    <p class="error-msg" id="errorMsg">Incorrect username or password.</p>
    <button class="btn" type="submit" id="submitBtn">
      Sign in
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/></svg>
    </button>
  </form>
  <p class="footer-note"><a href="/">← Back to website</a></p>
</div>
<script>
  // Redirect if already logged in
  fetch('/api/auth/check').then(r => r.json()).then(d => {
    if (d.admin) window.location.href = '/admin/dashboard.html';
  });

  document.getElementById('loginForm').addEventListener('submit', async function(e) {
    e.preventDefault();
    const btn = document.getElementById('submitBtn');
    const err = document.getElementById('errorMsg');
    err.classList.remove('show');
    btn.disabled = true;
    btn.textContent = 'Signing in…';
    try {
      const res = await fetch('/api/auth/login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          username: document.getElementById('username').value,
          password: document.getElementById('password').value
        })
      });
      const data = await res.json();
      if (data.ok) {
        window.location.href = '/admin/dashboard.html';
      } else {
        err.classList.add('show');
        btn.disabled = false;
        btn.innerHTML = 'Sign in <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/></svg>';
      }
    } catch {
      err.textContent = 'Connection error. Is the server running?';
      err.classList.add('show');
      btn.disabled = false;
      btn.textContent = 'Sign in';
    }
  });
</script>
</body>
</html>
